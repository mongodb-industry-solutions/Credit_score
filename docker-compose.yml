services:
  credit-score-front:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: credit-score-front:latest
    ports:
      - "7777:3000"
    restart: always
    container_name: credit-score-front

  credit-score-back:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: credit-score-back:latest
    ports:
      - "5000:5000"
    restart: always
    container_name: credit-score-back